description: |-
  Terraform module to create and manage VNet Peering on Azure.

usage: |-
  ### Example

  ```hcl
  module "vnet-peering" {
    source = "./"

    name                = "vnet-peering-demo"
    resource_group_name = "rg-demo"
    location            = "Central India"
  }
  ```
