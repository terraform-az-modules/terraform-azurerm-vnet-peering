name: Terraform Plan PR Diff

on:
  pull_request:
    branches:
      - master
    paths:
      - 'examples/complete/**'

jobs:
# Update 'Job name' and 'terraform_directory' as needed based on the module structure.
  peering_in_diff_subscription-example:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-diff-checks.yml@v2
    with:
      provider: 'azurerm'
      terraform_directory: 'examples/peering_in_diff_subscription'
      target_branch: 'master'
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  peering_in_same_subscription-example:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-diff-checks.yml@v2
    with:
      provider: 'azurerm'
      terraform_directory: 'examples/peering_in_same_subscription'
      target_branch: 'master'
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
