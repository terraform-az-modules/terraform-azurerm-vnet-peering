name: tf-checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  peering_in_same_subscription-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@v2
    with:
      working_directory: './examples/peering_in_same_subscription/'
      provider: none

  peering_in_diff_subscription-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@v2
    with:
      working_directory: './examples/peering_in_diff_subscription/'
      provider: none

  # Seperate Job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@v2
    secrets:
      GITHUB: ${{ secrets.GITHUB }}